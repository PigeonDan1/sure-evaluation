id: scoring/pesq
version: v1
stage: scoring
language_sensitive: false
input_schema: speech_enhancement_audio_pairs
output_schema: full_reference_audio_metric
implementation: sure_eval.evaluation.nodes.scoring.pesq.node
metric: pesq
backend: pesq
internal_stages:
  - audio_pair_decode
  - metric_provider
  - score_normalization
  - mean_aggregation
used_by:
  - SE full-reference speech enhancement quality
notes:
  - Higher is better.
  - Default provider uses wide-band PESQ at 16 kHz.
