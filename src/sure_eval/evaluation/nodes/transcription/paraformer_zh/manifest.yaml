id: transcription/paraformer_zh
version: v1
stage: transcription
language_sensitive: true
languages: [zh, cmn, yue]
input_schema: audio_path
output_schema: transcript_text
implementation: sure_eval.evaluation.nodes.transcription.paraformer_zh.node
default_runner: sure_eval.evaluation.nodes.transcription.ParaformerZHTranscriber
internal_stages:
  - audio_decode
  - asr_inference
  - text_extraction
used_by:
  - TTS semantic CER
  - VC semantic CER
notes:
  - The node can receive an injected runner for tests and lightweight smoke checks.
  - Default model loading remains lazy through the existing TTS semantic provider.
