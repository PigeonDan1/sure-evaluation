task: TTS
language_sensitive: true
routes:
  - route_id: tts.zh.tts_cer.funasr_loader_16k_mono.paraformer_zh.punctuation_strip_norm.wenet_cer
    language: zh
    metric: tts_cer
    family: semantic_error_rate
    pipeline_id: tts.{language}.tts_cer.funasr_loader_16k_mono.paraformer_zh.punctuation_strip_norm.wenet_cer
    nodes:
      - frontend/funasr_loader_16k_mono
      - transcription/paraformer_zh
      - normalization/punctuation_strip_norm
      - scoring/wenet_cer
    input_contract: semantic/asr_error_rate
    executor: sure_eval.evaluation.tasks.tts.pipeline.evaluate_tts_samples
  - route_id: tts.en.tts_wer.whisper_large_v3.whisper_norm.wenet_wer
    language: en
    metric: tts_wer
    family: semantic_error_rate
    pipeline_id: tts.{language}.tts_wer.whisper_large_v3.whisper_norm.wenet_wer
    nodes:
      - transcription/whisper_large_v3
      - normalization/whisper_norm
      - scoring/wenet_wer
    input_contract: semantic/asr_error_rate
    executor: sure_eval.evaluation.tasks.tts.pipeline.evaluate_tts_samples
  - route_id: tts.any.sim_wavlm_large.wavlm_large_sim
    metric: sim/wavlm-large
    family: speaker_similarity
    pipeline_id: tts.{language}.multi.audio_metric_nodes
    nodes:
      - scoring/wavlm_large_sim
    input_contract: scoring/wavlm_large_sim
    executor: sure_eval.evaluation.tasks.tts.pipeline.evaluate_tts_samples
  - route_id: tts.any.sim_ecapa_tdnn.ecapa_tdnn_sim
    metric: sim/ecapa-tdnn
    family: speaker_similarity
    pipeline_id: tts.{language}.multi.audio_metric_nodes
    nodes:
      - scoring/ecapa_tdnn_sim
    input_contract: scoring/ecapa_tdnn_sim
    executor: sure_eval.evaluation.tasks.tts.pipeline.evaluate_tts_samples
  - route_id: tts.any.sim_eres2net.eres2net_sim
    metric: sim/eres2net
    family: speaker_similarity
    pipeline_id: tts.{language}.multi.audio_metric_nodes
    nodes:
      - scoring/eres2net_sim
    input_contract: scoring/eres2net_sim
    executor: sure_eval.evaluation.tasks.tts.pipeline.evaluate_tts_samples
  - route_id: tts.any.dnsmos.dnsmos
    metric: dnsmos
    family: mos
    pipeline_id: tts.{language}.multi.audio_metric_nodes
    nodes:
      - scoring/dnsmos
    input_contract: scoring/dnsmos
    executor: sure_eval.evaluation.tasks.tts.pipeline.evaluate_tts_samples
  - route_id: tts.any.wv_mos.wv_mos
    metric: wv-mos
    family: mos
    pipeline_id: tts.{language}.multi.audio_metric_nodes
    nodes:
      - scoring/wv_mos
    input_contract: scoring/wv_mos
    executor: sure_eval.evaluation.tasks.tts.pipeline.evaluate_tts_samples
  - route_id: tts.any.utmos.utmos
    metric: utmos
    family: mos
    pipeline_id: tts.{language}.multi.audio_metric_nodes
    nodes:
      - scoring/utmos
    input_contract: scoring/utmos
    executor: sure_eval.evaluation.tasks.tts.pipeline.evaluate_tts_samples
