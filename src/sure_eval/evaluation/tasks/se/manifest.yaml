task: SE
language_sensitive: false
canonical_entry: sure_eval.evaluation.tasks.se.pipeline.evaluate_se_samples
implemented_metrics:
  - si_sdr
  - stoi
  - pesq
  - dnsmos
  - wv_mos
  - utmos
default_metrics:
  n/a:
    - si-sdr
    - stoi
    - pesq
    - dnsmos
    - wv-mos
    - utmos
default_pipeline: se.any.multi.si_sdr.si_sdr_v1__stoi.stoi_v1__pesq.pesq_v1__dnsmos.dnsmos_v1__wv_mos.wv_mos_v1__utmos.utmos_v1
input_contracts:
  audio_samples_jsonl:
    purpose: se_cli_audio_samples_batch_input
    required_roles: [samples_jsonl]
    optional_roles: [cache_dir, device]
    row_format: audio_samples_jsonl
    alignment_key: sample_id
    aggregation: per_sample_then_metric_aggregation
    main_report: false
  scoring/si_sdr:
    purpose: se_full_reference_scale_invariant_distortion
    required_roles: [enhanced_audio, reference_audio]
    optional_roles: [noisy_audio]
    row_format: speech_enhancement_audio_pairs
    alignment_key: sample_id
    aggregation: mean
    main_report: true
  scoring/stoi:
    purpose: se_full_reference_intelligibility
    required_roles: [enhanced_audio, reference_audio]
    optional_roles: [noisy_audio]
    row_format: speech_enhancement_audio_pairs
    alignment_key: sample_id
    aggregation: mean
    main_report: true
  scoring/pesq:
    purpose: se_full_reference_perceptual_quality
    required_roles: [enhanced_audio, reference_audio]
    optional_roles: [noisy_audio]
    row_format: speech_enhancement_audio_pairs
    alignment_key: sample_id
    aggregation: mean
    main_report: true
  scoring/dnsmos:
    purpose: se_no_reference_speech_quality
    required_roles: [enhanced_audio]
    optional_roles: [noisy_audio, reference_audio]
    row_format: enhanced_audio_rows
    alignment_key: sample_id
    aggregation: mean
    main_report: true
  scoring/wv_mos:
    purpose: se_no_reference_speech_quality
    required_roles: [enhanced_audio]
    optional_roles: [noisy_audio, reference_audio]
    row_format: enhanced_audio_rows
    alignment_key: sample_id
    aggregation: mean
    main_report: true
  scoring/utmos:
    purpose: se_no_reference_speech_quality
    required_roles: [enhanced_audio]
    optional_roles: [noisy_audio, reference_audio]
    row_format: enhanced_audio_rows
    alignment_key: sample_id
    aggregation: mean
    main_report: true
pipeline_nodes:
  full_reference:
    si-sdr: scoring/si_sdr
    stoi: scoring/stoi
    pesq: scoring/pesq
  no_reference:
    dnsmos: scoring/dnsmos
    wv-mos: scoring/wv_mos
    utmos: scoring/utmos
notes:
  - SE evaluates enhanced audio produced from noisy speech.
  - Full-reference metrics compare enhanced_audio with clean reference_audio.
  - No-reference MOS metrics score enhanced_audio directly.
