  - route_id: vc.en.vc_wer.audio.whisper_large_v3.whisper_norm.wenet_wer
    language: en
    metric: vc_wer
    family: semantic_error_rate
    reference_mode: audio
    pipeline_id: vc.en.vc_wer.whisper_large_v3.whisper_norm.wenet_wer
