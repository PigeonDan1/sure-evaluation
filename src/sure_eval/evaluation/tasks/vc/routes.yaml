    nodes:
      - frontend/funasr_loader_16k_mono
      - transcription/paraformer_zh
      - normalization/punctuation_strip_norm
      - scoring/wenet_cer
    input_contract: semantic/asr_error_rate_with_text
    executor: sure_eval.evaluation.tasks.vc.pipeline.evaluate_vc_samples
